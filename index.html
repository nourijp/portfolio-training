<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Training & Enablement — Hamed Nouri</title>
  <meta name="description" content="Training program design, facilitator guides, and enablement resources. Coming soon.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: rgba(255,255,255,0.07);
      --accent: #7c6dfa;
      --accent2: #a78bfa;
      --text: #e8e8f0;
      --muted: #6b6b80;
    }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3.5rem 3rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: -80px; left: 50%; transform: translateX(-50%);
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(124,109,250,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .tag {
      display: inline-block;
      background: rgba(124,109,250,0.12);
      color: var(--accent2);
      border: 1px solid rgba(124,109,250,0.25);
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.3rem 0.9rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 600;
      line-height: 1.2;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #fff 30%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subdomain {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 1.25rem;
      font-family: 'Courier New', monospace;
    }
    p {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .links {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    a {
      display: inline-block;
      padding: 0.6rem 1.4rem;
      border-radius: 10px;
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: #6a5cf5; transform: translateY(-1px); }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent2); }
    footer {
      margin-top: 3rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
    footer a { color: var(--accent2); text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="tag">Coming Soon</div>
    <h1>Training & Enablement</h1>
    <div class="subdomain">training.hamednouri.com</div>
    <p>Training program design, facilitator guides, and enablement resources. Coming soon.</p>
    <div class="links">
      <a href="https://hub.hamednouri.com" class="btn-primary">← Portfolio Hub</a>
      <a href="mailto:work@hamednouri.com" class="btn-ghost">Get in Touch</a>
    </div>
  </div>
  <footer>
    <a href="https://hub.hamednouri.com">Hamed Nouri</a> &nbsp;·&nbsp; Denton, TX
  </footer>
</body>
</html>
